pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,ts,jsx,tsx,json}"
      run: npx biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true
    typecheck:
      run: npm run typecheck

commit-msg:
  commands:
    # Enforce the house format: [AREA] [ACTION] What it does
    # e.g. [BACKEND] [ADD] Health endpoint  |  [DOCKER] [UPDATE] Bump traefik
    format:
      run: |
        head -1 {1} | grep -qE '^\[[A-Za-z0-9_./-]+\] \[[A-Za-z]+\] .+' || {
          echo "Commit subject must match [AREA] [ACTION] What it does"
          exit 1
        }
