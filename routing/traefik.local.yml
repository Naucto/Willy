# Traefik static config for LOCAL development (no OVH, no ACME).
# The websecure entrypoint has no certResolver, so routers (tls=true) serve the default
# certificate provided by the file provider (routing/local/tls.yml -> mkcert cert).
global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: DEBUG

accessLog: {}

api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
  # Per-port entrypoints for hard-bound domains (HTTPS/WSS only). Generated by scripts/dev_setup.sh
  # from WILLY_PORT_BIND_RANGE when set.
  # willy:port-bind-entrypoints (generated) — do not edit by hand
