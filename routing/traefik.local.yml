# Traefik static config for LOCAL development (no OVH, no ACME).
# The websecure entrypoint has no certResolver, so routers (tls=true) serve the default
# certificate provided by the file provider (routing/local/tls.yml -> mkcert cert).
global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: DEBUG

accessLog: {}

api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
  # Per-port entrypoints for hard-bound domains (HTTPS/WSS only). Generated by scripts/dev_setup.sh
  # from WILLY_PORT_BIND_RANGE when set.
  # willy:port-bind-entrypoints (generated) — do not edit by hand
  port-10000:
    address: ":10000"
  port-10001:
    address: ":10001"
  port-10002:
    address: ":10002"
  port-10003:
    address: ":10003"
  port-10004:
    address: ":10004"
  port-10005:
    address: ":10005"
  port-10006:
    address: ":10006"
  port-10007:
    address: ":10007"
  port-10008:
    address: ":10008"
  port-10009:
    address: ":10009"
  port-10010:
    address: ":10010"
  port-10011:
    address: ":10011"
  port-10012:
    address: ":10012"
  port-10013:
    address: ":10013"
  port-10014:
    address: ":10014"
  port-10015:
    address: ":10015"
  port-10016:
    address: ":10016"
  port-10017:
    address: ":10017"
  port-10018:
    address: ":10018"
  port-10019:
    address: ":10019"
  # /willy:port-bind-entrypoints

providers:
  docker:
    endpoint: "tcp://docker-socket-proxy:2375"
    exposedByDefault: false
    network: willy_edge
    watch: true
  file:
    directory: /etc/traefik/dynamic
    watch: true
