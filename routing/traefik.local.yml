# Traefik static config for LOCAL development (no OVH, no ACME).
# The websecure entrypoint has no certResolver, so routers (tls=true) serve the default
# certificate provided by the file provider (routing/local/tls.yml -> mkcert cert).
global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: DEBUG

accessLog: {}

api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "tcp://docker-socket-proxy:2375"
    exposedByDefault: false
    network: willy_edge
    watch: true
  file:
    directory: /etc/traefik/dynamic
    watch: true
