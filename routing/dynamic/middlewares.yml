# Host-agnostic shared middlewares (Traefik file provider). Host-specific routers are
# created from container labels (compose-expanded), not here.
http:
  middlewares:
    # Applied to deployed apps. Deliberately no CSP/frame-deny here — those are app-specific and a
    # blanket policy would break tenant apps.
    sec-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        contentTypeNosniff: true
        referrerPolicy: "strict-origin-when-cross-origin"
    # Hardened headers for Willy's OWN control panel (willy-web/willy-api): adds clickjacking
    # protection and a strict CSP. The SPA is fully self-hosted; emotion needs inline styles.
    panel-sec-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        contentTypeNosniff: true
        frameDeny: true
        referrerPolicy: "strict-origin-when-cross-origin"
        contentSecurityPolicy: >-
          default-src 'self';
          script-src 'self';
          img-src 'self' data:;
          style-src 'self' 'unsafe-inline';
          font-src 'self' data:;
          connect-src 'self';
          worker-src 'self' blob:;
          frame-ancestors 'none';
          base-uri 'self';
          form-action 'self';
          object-src 'none'
    # No blanket rate-limit middleware: it isn't wired to any router, and a global cap would throttle
    # the high-connection WebRTC tenant apps Willy fronts. Add a scoped limiter per-app if ever needed.
