networks:
  back-tier:
  front-tier:

volumes:
  db-data:

services:
  db:
    image: postgres
    volumes:
      - db-data:/var/lib/postgresql
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
      - POSTGRES_HOST
      - POSTGRES_PORT
    networks:
      - back-tier

  backend:
    image: naucto-dev-backend
    build:
      context: dev_environment/backend
      args:
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        POSTGRES_DB: ${POSTGRES_DB}
        POSTGRES_HOST: ${POSTGRES_HOST}
        POSTGRES_PORT: ${POSTGRES_PORT}
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
      - POSTGRES_HOST
      - POSTGRES_PORT
      - BACKEND_PORT
      - JWT_SECRET
      - JWT_EXPIRES_IN
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_REGION
    networks:
      - back-tier
      - front-tier
    depends_on:
      - db
    publish:
      - "${BACKEND_PORT}:${BACKEND_PORT}"

  frontend:
    image: naucto-dev-frontend
    build: dev_environment/frontend
    environment:
      - VITE_BACKEND_URL=http://backend:${BACKEND_PORT}/
    networks:
      - front-tier
    depends_on:
      - backend
    publish:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
