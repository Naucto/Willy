name: willy

# Infra stack for Willy itself. This is NOT managed through Willy's deployment tables —
# Willy must never redeploy its own control plane.

networks:
  # Shared edge network: Traefik + every WEB deployment join it. Routing is by Host rule,
  # never host ports, so apps never collide. Created here, referenced as external elsewhere.
  willy_edge:
    name: willy_edge
  # Private network for control-plane internals (db, socket proxy) — not exposed.
  willy_internal:
    name: willy_internal

volumes:
  postgres-data:
  willy_backups:

services:
  traefik:
    image: traefik:v3.7
    restart: unless-stopped
    depends_on:
      - docker-socket-proxy
    ports:
      - "80:80"
      - "443:443"
    environment:
      OVH_ENDPOINT: ${OVH_ENDPOINT:-}
      OVH_APPLICATION_KEY: ${OVH_APPLICATION_KEY:-}
      OVH_APPLICATION_SECRET: ${OVH_APPLICATION_SECRET:-}
      OVH_CONSUMER_KEY: ${OVH_CONSUMER_KEY:-}
      OVH_PROPAGATION_TIMEOUT: ${OVH_PROPAGATION_TIMEOUT:-120}
    volumes:
      - ./routing/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./routing/dynamic:/etc/traefik/dynamic:ro
      - ./routing/auth:/etc/traefik/auth:ro
      # Host bind (not a named volume) so the provisioner can create it 600, poll it, and back it up.
      - ./routing/letsencrypt:/letsencrypt
    networks:
      - willy_edge
      - willy_internal
    labels:
      traefik.enable: "true"
      traefik.docker.network: willy_edge
      traefik.http.routers.dashboard.rule: Host(`traefik.${BASE_DOMAIN}`)
      traefik.http.routers.dashboard.entrypoints: websecure
      traefik.http.routers.dashboard.tls: "true"
      traefik.http.routers.dashboard.tls.certresolver: ovh
      traefik.http.routers.dashboard.service: api@internal
      traefik.http.routers.dashboard.middlewares: dashboard-auth@file

  # Least-privilege gateway to the Docker Engine. Traefik and willy-server talk to Docker
  # through this, never the raw socket. Only the API surface Willy needs is enabled.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      BUILD: 1
      EXEC: 1
      INFO: 1
      PING: 1
      POST: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - willy_internal

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - willy_internal

  willy-server:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: willy-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    environment:
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      WILLY_MASTER_KEY: ${WILLY_MASTER_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-}
      DOCKER_PROXY_HOST: ${DOCKER_PROXY_HOST:-docker-socket-proxy}
      DOCKER_PROXY_PORT: ${DOCKER_PROXY_PORT:-2375}
      BASE_DOMAIN: ${BASE_DOMAIN}
      OVH_ENDPOINT: ${OVH_ENDPOINT:-}
      OVH_APPLICATION_KEY: ${OVH_APPLICATION_KEY:-}
      OVH_APPLICATION_SECRET: ${OVH_APPLICATION_SECRET:-}
      OVH_CONSUMER_KEY: ${OVH_CONSUMER_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - willy_edge
      - willy_internal
    labels:
      traefik.enable: "true"
      traefik.docker.network: willy_edge
      traefik.http.routers.willy-api.rule: Host(`${PANEL_HOST}`) && PathPrefix(`/api`)
      traefik.http.routers.willy-api.entrypoints: websecure
      traefik.http.routers.willy-api.tls: "true"
      traefik.http.routers.willy-api.tls.certresolver: ovh
      traefik.http.services.willy-api.loadbalancer.server.port: "3000"

  willy-web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: willy-web
    restart: unless-stopped
    depends_on:
      - willy-server
    networks:
      - willy_edge
    labels:
      traefik.enable: "true"
      traefik.docker.network: willy_edge
      traefik.http.routers.willy-web.rule: Host(`${PANEL_HOST}`)
      traefik.http.routers.willy-web.entrypoints: websecure
      traefik.http.routers.willy-web.tls: "true"
      traefik.http.routers.willy-web.tls.certresolver: ovh
      traefik.http.services.willy-web.loadbalancer.server.port: "80"
