version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      # One PR for routine dev-tooling bumps to cut noise.
      dev-dependencies:
        dependency-type: development
      # One PR for non-breaking production bumps; majors still arrive individually for review.
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    directories:
      - /backend
      - /frontend
    schedule:
      interval: weekly
    groups:
      docker:
        patterns:
          - "*"
