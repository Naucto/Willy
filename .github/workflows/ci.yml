name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Lint + format (Biome)
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests (Vitest)
        run: npm run test

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: ShellCheck provisioner + scripts
        run: shellcheck scripts/*.sh

  build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v7
      - name: Build images
        run: docker compose build

  # Integration (Testcontainers) and Playwright e2e jobs are added as those layers land
  # (Phase 2+ / Phase 4+). On tags, a publish job will push images to ghcr.io.
