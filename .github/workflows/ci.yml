name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Lint + format (Biome)
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests (Vitest)
        run: npm run test

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: ShellCheck provisioner + scripts
        run: shellcheck scripts/*.sh

  build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      # bake builds the compose `build:` targets (willy-server, willy-web) with a persistent GHA
      # layer cache, so unchanged layers are reused across runs instead of rebuilt every push.
      - name: Build images (buildx bake + GHA layer cache)
        run: >
          docker buildx bake -f docker-compose.yml
          --set "*.cache-from=type=gha"
          --set "*.cache-to=type=gha,mode=max"

  # Integration (Testcontainers) and Playwright e2e jobs are added as those layers land
  # (Phase 2+ / Phase 4+). On tags, a publish job will push images to ghcr.io.
